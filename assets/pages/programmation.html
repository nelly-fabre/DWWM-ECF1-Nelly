<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programmation | Le Phosphore</title>
    <link rel="stylesheet" href="../css/style.min.css" />
    <link
      rel="icon"
      href="/assets/img/favicon_io/favicon-32x32.png"
      type="image/png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script>
      $(document).ready(function () {
        $("#header-content").load("assets/pages/header.html", function () {
          const currentPage = window.location.pathname.split("/").pop();

          document.querySelectorAll(".nav-link").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            if (linkPage === currentPage) {
              link.classList.add("active");
            } else {
              link.classList.remove("active");
            }
          });
        });

        $("#footer-content").load("assets/pages/footer.html");

        $("#carousel").load("assets/pages/carousel.html");
      });
    </script>
    <meta
      name="description"
      content="Retrouvez toute la programmation de la salle de spectacle"
    />
  </head>
  <body>
    <div id="header-content"></div>
    <main class="programmation">
      <!-- 
=====================================================
-----------------FILTERS-----------------------------
====================================================
 -->

      <section class="filters"></section>
      <select id="filter-type">
        <option value="">Tous les types</option>
        <option value="theatre">Théâtre</option>
        <option value="concert">Concert</option>
        <option value="standup">Stand-up</option>
      </select>

      <select id="filter-date">
        <option value="">Toutes les dates</option>
      </select>

      <select id="filter-dispo">
        <option value="">Disponibilité</option>
        <option value="dispo">Places disponibles uniquement</option>
      </select>
      <h2>La Programmation</h2>

      <!-- 
========================================================
-------------------PROGRAMMATION------------------------
=========================================================
 -->

      <section class="program"></section>
    </main>
    <section id="carousel"></section>
    <div id="footer-content"></div>

    <script src="/assets/js/programmation.js"></script>
    <script src="/assets/js/main.js"></script>
  </body>
</html>
