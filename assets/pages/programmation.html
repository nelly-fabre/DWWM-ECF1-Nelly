<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programmation | Le Phosphore</title>
    <link rel="stylesheet" href="../css/style.min.css" />
    <link
      rel="icon"
      href="/assets/img/favicon_io/favicon-32x32.png"
      type="image/png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script>
      $(document).ready(function () {
        $("#header-content").load("header.html", function () {
          const currentPage = window.location.pathname.split("/").pop();

          document.querySelectorAll(".nav-link").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            if (linkPage === currentPage) {
              link.classList.add("active");
            } else {
              link.classList.remove("active");
            }
          });
        });

        $("#footer-content").load("footer.html", function () {});
      });
    </script>
    <meta
      name="description"
      content="Retrouvez toute la programmation de la salle de spectacle"
    />
  </head>
  <body>
    <div id="header-content"></div>
    <main class="programmation">
      <!-- 
=====================================================
-----------------FILTERS-----------------------------
====================================================
 -->

      <section class="filters"></section>
      <select id="filter-type">
        <option value="">Tous les types</option>
        <option value="theatre">Théâtre</option>
        <option value="concert">Concert</option>
        <option value="standup">Stand-up</option>
      </select>

      <select id="filter-date">
        <option value="">Toutes les dates</option>
      </select>

      <select id="filter-dispo">
        <option value="">Disponibilité</option>
        <option value="dispo">Places disponibles uniquement</option>
      </select>
      <h2>La Programmation</h2>

      <!-- 
========================================================
-------------------PROGRAMMATION------------------------
=========================================================
 -->

      <section class="program"></section>

      <!-- 
========================================================
------------------------CAROUSEL------------------------
=========================================================
 -->

      <section class="programs-highlights" id="programs-highlights">
        <!-------------------------------------->
        <!-- Project carousel wrapper (START) -->
        <!-------------------------------------->
        <div class="programs-highlights__carousel-wrapper">
          <!---------------------------->
          <!-- Project carousel (START) -->
          <!------------------------------>
          <div class="programs-highlights__carousel">
            <!----------------------------------->
            <!-- Carousel arrows scroll(START) -->
            <!----------------------------------->
            <div class="programs-highlights__carousel-project__navigation">
              <!----------------------------->
              <!--  TO RIGHT arrows scroll -->
              <!----------------------------->
              <div class="arrow-wrapper navigation-scrollToRight">
                <svg
                  class="navigation-scrollToRight"
                  width="58"
                  height="15"
                  viewBox="0 0 58 15"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M57.5093 7.01528L46.9864 13.0907V0.939868L57.5093 7.01528Z"
                    fill="currentColor"
                  />
                  <line
                    x1="46.9857"
                    y1="6.84155"
                    y2="6.84155"
                    stroke="currentColor"
                    stroke-width="4"
                  />
                </svg>
              </div>

              <!---------------------------->
              <!--  TO LEFT arrows scroll -->
              <!---------------------------->
              <div class="arrow-wrapper navigation-scrollToLeft">
                <svg
                  class="navigation-scrollToLeft"
                  width="58"
                  height="15"
                  viewBox="0 0 58 15"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M0 7.01528L10.5229 0.939869V13.0907L0 7.01528Z"
                    fill="currentColor"
                  />
                  <line
                    x1="10.5237"
                    y1="7.189"
                    x2="57.5093"
                    y2="7.189"
                    stroke="currentColor"
                    stroke-width="4"
                  />
                </svg>
              </div>
              <!--------------------------------->
              <!-- Carousel arrows scroll(END) -->
              <!--------------------------------->
            </div>

            <!------------------------------------>
            <!-- Carousel cards wrapper (START) -->
            <!------------------------------------>
            <div class="programs-highlights__carousel__cards-wrapper">
              <!-------------------->
              <!-- PROJECT CARD 1 -->
              <!-------------------->
              <div class="programs-highlights__carousel__card is-active">
                <div class="programs-highlights__carousel__card__picture">
                  <!------------------------------------------->
                  <!-- DIV FOR HOVER AND LINK TO THE PROJECT -->
                  <!------------------------------------------->
                  <a
                    href="assets/pages/detail-program.html?id=1"
                    class="programs-highlights__carousel-project-link"
                    ><div class="picture-hover">
                      <img
                        src="assets/img/hover-more-icon.png"
                        alt="-"
                        class="more-icon"
                      /></div
                  ></a>
                  <img
                    src="/assets/img/Cyrano.webp"
                    alt=""
                    class="programs-highlights__carousel__card__picture-item"
                  />
                </div>
                <p class="programs-highlights__carousel__card__title">
                  Cyrano de Bergerac
                </p>
              </div>
              <!-------------------->
              <!-- PROJECT CARD 2 -->
              <!-------------------->
              <div class="programs-highlights__carousel__card is-inactive">
                <div class="programs-highlights__carousel__card__picture">
                  <!------------------------------------------->
                  <!-- DIV FOR HOVER AND LINK TO THE PROJECT -->
                  <!------------------------------------------->
                  <a
                    href="assets/pages/detail-program.html?id=1"
                    class="programs-highlights__carousel-project-link"
                    ><div class="picture-hover">
                      <img
                        src="assets/img/hover-more-icon.png"
                        alt="-"
                        class="more-icon"
                      /></div
                  ></a>

                  <img
                    src="/assets/img/jamel.webp"
                    alt=""
                    class="programs-highlights__carousel__card__picture-item"
                  />
                </div>
                <p class="programs-highlights__carousel__card__title">
                  Jamel Comedy Club
                </p>
              </div>
              <!-------------------->
              <!-- PROJECT CARD 3 -->
              <!-------------------->
              <div class="programs-highlights__carousel__card is-inactive">
                <div class="programs-highlights__carousel__card__picture">
                  <!------------------------------------------->
                  <!-- DIV FOR HOVER AND LINK TO THE PROJECT -->
                  <!------------------------------------------->
                  <a
                    href="assets/pages/detail-program.html?id=1"
                    class="programs-highlights__carousel-project-link"
                    ><div class="picture-hover">
                      <img
                        src="assets/img/hover-more-icon.png"
                        alt="-"
                        class="more-icon"
                      /></div
                  ></a>
                  <img
                    src="/assets/img/paul.webp"
                    alt=""
                    class="programs-highlights__carousel__card__picture-item"
                  />
                </div>
                <p class="programs-highlights__carousel__card__title">
                  Paul Music
                </p>
              </div>
            </div>
            <!---------------------------------->
            <!-- Carousel cards wrapper (END) -->
            <!---------------------------------->
          </div>

          <a
            href="assets/pages/programmation.html"
            class="backlink-to-full-page"
            >Voir l'ensemble des spectacles</a
          >
        </div>
        <!---------------------------------->
        <!-- Carousel cards wrapper (END) -->
        <!---------------------------------->
      </section>
    </main>
    <div id="footer-content"></div>

    <script src="/assets/js/programmation.js"></script>
    <script src="/assets/js/main.js"></script>
  </body>
</html>
