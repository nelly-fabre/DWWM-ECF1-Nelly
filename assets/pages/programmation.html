<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programmation | Le Phosphore</title>
    <link rel="stylesheet" href="../css/style.min.css" />
    <link
      rel="icon"
      href="/assets/img/favicon_io/favicon-32x32.png"
      type="image/png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script>
      $(document).ready(function () {
        $("#header-content").load("/assets/pages/header.html", function () {
          // active link
          const currentPage = window.location.pathname.split("/").pop();
          document.querySelectorAll(".navbar__links a").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            link.classList.toggle("active", linkPage === currentPage);
          });

          // Burger menu
          const burger = document.getElementById("burger");
          const navLinks = document.querySelector(".navbar__links");

          if (burger && navLinks) {
            burger.addEventListener("click", () => {
              const isOpen = navLinks.classList.toggle("open");
              burger.setAttribute("aria-expanded", isOpen);
            });
          }
        });
        $("#footer-content").load("/assets/pages/footer.html");
      });
    </script>
    <meta
      name="description"
      content="Retrouvez toute la programmation de la salle de spectacle"
    />
  </head>
  <body>
    <div id="header-content"></div>
    <main class="programmation">
      <!-- 
=====================================================
-----------------FILTERS-----------------------------
====================================================
 -->

      <section class="filters"></section>
      <select id="filter-type">
        <option value="">Tous les types</option>
        <option value="theatre">Théâtre</option>
        <option value="concert">Concert</option>
        <option value="standup">Stand-up</option>
      </select>

      <select id="filter-date">
        <option value="">Toutes les dates</option>
      </select>

      <select id="filter-dispo">
        <option value="">Disponibilité</option>
        <option value="dispo">Places disponibles uniquement</option>
      </select>
      <h2>La Programmation</h2>

      <!-- 
========================================================
-------------------PROGRAMMATION------------------------
=========================================================
 -->

      <section class="program"></section>
    </main>

    <div id="footer-content"></div>

    <script src="/assets/js/programmation.js"></script>
  </body>
</html>
