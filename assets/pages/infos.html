<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infos Pratiques | Le Phosphore</title>
    <link rel="stylesheet" href="../css/style.min.css" />
    <link
      rel="icon"
      href="/assets/img/favicon_io/favicon-32x32.png"
      type="image/png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script>
      $(document).ready(function () {
        $("#header-content").load("/assets/pages/header.html", function () {
          const currentPage = window.location.pathname.split("/").pop();

          document.querySelectorAll(".nav-link").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            if (linkPage === currentPage) {
              link.classList.add("active");
            } else {
              link.classList.remove("active");
            }
          });
        });

        $("#footer-content").load("/assets/pages/footer.html");
      });
    </script>
    <meta
      name="description"
      content="Retrouvez toute la programmation de la salle de spectacle"
    />
  </head>
  <body>
    <header><div id="header-content"></div></header>
    <main>
      <section class="info-hero">
        <div class="info-hero__left">
          <img src="/assets/img/" alt="" />
        </div>
      </section>
    </main>
    <footer><div id="footer-content"></div></footer>
  </body>
</html>
