<!doctype html>
<html lang="fr">
  <head>
    <base href="/DWWM-ECF1-Nelly/" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Spectacle | Le Phosphore</title>

    <link rel="stylesheet" href="assets/css/style.min.css" />
    <link
      rel="icon"
      href="assets/img/favicon_io/favicon-32x32.webp"
      type="image/png"
    />
    <script type="module" src="../js/detail-program.js"></script>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script>
      $(document).ready(function () {
        $("#header-content").load("./pages/header.html", function () {
          // active link
          const currentPage = window.location.pathname.split("/").pop();
          document.querySelectorAll(".navbar__links a").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            link.classList.toggle("active", linkPage === currentPage);
          });

          // Burger menu
          const burger = document.getElementById("burger");
          const navLinks = document.querySelector(".navbar__links");

          if (burger && navLinks) {
            burger.addEventListener("click", () => {
              const isOpen = navLinks.classList.toggle("open");
              burger.setAttribute("aria-expanded", isOpen);
            });
          }
        });
        // footer
        $("#footer-content").load("footer.html");
        $("#carousel").load("../pages/carousel.html");
      });
    </script>
  </head>
  <body>
    <div id="header-content"></div>
    <section class="detail-program"></section>
    <section id="carousel"></section>
    <div id="footer-content"></div>
  </body>
</html>
