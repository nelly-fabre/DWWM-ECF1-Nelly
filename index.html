<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Le Phosphore | Salle de Spectacle</title>
    <link rel="stylesheet" href="/assets/css/style.min.css" />
    <link
      rel="icon"
      href="/assets/img/favicon_io/favicon-32x32.png"
      type="image/png"
    />
    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>

    <script>
      $(document).ready(function () {
        $("#header-content").load("assets/pages/header.html", function () {
          const currentPage = window.location.pathname.split("/").pop();

          document.querySelectorAll(".nav-link").forEach((link) => {
            const linkPage = link.getAttribute("href").split("/").pop();
            if (linkPage === currentPage) {
              link.classList.add("active");
            } else {
              link.classList.remove("active");
            }
          });
        });

        $("#footer-content").load("assets/pages/footer.html", function () {});
      });
    </script>
  </head>
  <body>
    <header>
      <div id="header-content"></div>
    </header>
    <main>
      <section class="index-hero">
        <div class="hero-content">
          <img
            class="hero-content__logo"
            src="/assets/img/picto-detour.png"
            alt="logo-phosphore"
          />
          <h1>Le Phosphore</h1>
          <h3>Salle de Spectacle</h3>
          <button class="btn-reserve">Découvrir la programmation</button>
        </div>
      </section>
    </main>
    <footer><div id="footer-content"></div></footer>
  </body>
</html>
